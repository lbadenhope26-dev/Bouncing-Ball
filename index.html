<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Ball Energy Simulation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            display: flex;
            gap: 20px;
            max-width: 1000px;
        }
        .left-col {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        canvas {
            background-color: #000;
            border: 2px solid #444;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .panel {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            margin-bottom: 5px;
            color: #aaa;
        }
        input[type="range"] {
            width: 100%;
        }
        .readout {
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .readout div {
            display: flex;
            flex-direction: column;
        }
        .readout span {
            color: #4CAF50;
            font-size: 1.2em;
            font-weight: bold;
        }
        .energy-bars {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }
        .bar-container {
            width: 100%;
            height: 20px;
            background-color: #444;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .bar {
            height: 100%;
            width: 0%;
            transition: width 0.05s linear;
        }
        #bar-pe { background-color: #3498db; }
        #bar-ke { background-color: #e74c3c; }
        #bar-th { background-color: #f1c40f; }
        .bar-label {
            position: absolute;
            top: 0;
            left: 5px;
            font-size: 0.8em;
            line-height: 20px;
            text-shadow: 1px 1px 2px black;
        }
        .graph-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: #aaa;
            margin-bottom: -10px;
        }
        .legend span {
            margin-left: 10px;
            font-weight: bold;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
        button:hover { background-color: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <div class="left-col">
        <canvas id="simCanvas" width="400" height="400"></canvas>
        
        <div class="graph-header">
            <span>Energy Stacked Area Chart (Scrolling)</span>
            <div class="legend">
                <span style="color: #3498db;">■ PE</span>
                <span style="color: #e74c3c;">■ KE</span>
                <span style="color: #f1c40f;">■ Thermal</span>
            </div>
        </div>
        <canvas id="graphCanvas" width="400" height="180"></canvas>
    </div>

    <div class="panel">
        <h3>Simulation Parameters</h3>
        
        <div class="control-group">
            <label>Drop Height (m) <span id="val-height">8.0</span></label>
            <input type="range" id="sl-height" min="1" max="10" step="0.1" value="8">
        </div>
        
        <div class="control-group">
            <label>Gravity (m/s²) <span id="val-gravity">9.8</span></label>
            <input type="range" id="sl-gravity" min="1" max="20" step="0.1" value="9.8">
        </div>
        
        <div class="control-group">
            <label>Mass (kg) <span id="val-mass">1.0</span></label>
            <input type="range" id="sl-mass" min="0.1" max="10" step="0.1" value="1.0">
        </div>
        
        <div class="control-group">
            <label>Bounciness (Restitution) <span id="val-bounce">0.75</span></label>
            <input type="range" id="sl-bounce" min="0" max="1" step="0.05" value="0.75">
        </div>

        <div class="control-group">
            <label>Ghost Trails <span id="val-trails">Medium</span></label>
            <input type="range" id="sl-trails" min="0" max="0.95" step="0.05" value="0.5">
        </div>

        <button onclick="resetSim()">Drop Ball</button>

        <h3>Live Telemetry</h3>

            <div>Height:
