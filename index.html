<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Ball Energy Simulation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            display: flex;
            gap: 20px;
            max-width: 1400px;
        }
        .left-col {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .center-col {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 500px;
        }
        canvas {
            background-color: #000;
            border: 2px solid #444;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .panel {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            margin-bottom: 5px;
            color: #aaa;
        }
        input[type="range"] {
            width: 100%;
        }
        .readout {
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .readout div {
            display: flex;
            flex-direction: column;
        }
        .readout span {
            color: #4CAF50;
            font-size: 1.2em;
            font-weight: bold;
        }
        .energy-bars {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }
        .bar-container {
            width: 100%;
            height: 20px;
            background-color: #444;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .bar {
            height: 100%;
            width: 0%;
            transition: width 0.05s linear;
        }
        #bar-pe { background-color: #3498db; }
        #bar-ke { background-color: #e74c3c; }
        #bar-th { background-color: #f1c40f; }
        .bar-label {
            position: absolute;
            top: 0;
            left: 5px;
            font-size: 0.8em;
            line-height: 20px;
            text-shadow: 1px 1px 2px black;
        }
        .graph-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: #aaa;
            margin-bottom: -10px;
            margin-top: 5px;
        }
        .legend span {
            margin-left: 10px;
            font-weight: bold;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
        button:hover { background-color: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <div class="left-col">
        <canvas id="simCanvas" width="400" height="400"></canvas>
    </div>

    <div class="center-col">
        <div class="graph-header">
            <span>Energy Line Graph (Strict Conservation)</span>
            <div class="legend">
                <span style="color: #3498db;">— PE</span>
                <span style="color: #e74c3c;">— KE</span>
                <span style="color: #f1c40f;">— Thermal</span>
            </div>
        </div>
        <canvas id="lineGraphCanvas" width="500" height="370"></canvas>
    </div>

    <div class="panel">
        <h3>Simulation Parameters</h3>
        
        <div class="control-group">
            <label>Simulation Speed <span id="val-speed">1.0x</span></label>
            <input type="range" id="sl-speed" min="0.1" max="3" step="0.1" value="1.0">
        </div>

        <div class="control-group">
            <label>Drop Height (m) <span id="val-height">8.0</span></label>
            <input type="range" id="sl-height" min="1" max="10" step="0.1" value="8">
        </div>
        
        <div class="control-group">
            <label>Gravity (m/s²) <span id="val-gravity">9.8</span></label>
            <input type="range" id="sl-gravity" min="1" max="20" step="0.1" value="9.8">
        </div>
        
        <div class="control-group">
            <label>Mass (kg) <span id="val-mass">1.0</span></label>
            <input type="range" id="sl-mass" min="0.1" max="10" step="0.1" value="1.0">
        </div>
        
        <div class="control-group">
            <label>Bounciness (Restitution) <span id="val-bounce">0.75</span></label>
            <input type="range" id="sl-bounce" min="0" max="1" step="0.05" value="0.75">
        </div>

        <div class="control-group">
            <label>Ghost Trails <span id="val-trails">Medium</span></label>
            <input type="range" id="sl-trails" min="0" max="0.95" step="0.05" value="0.5">
        </div>

        <button onclick="resetSim()">Drop Ball</button>

        <h3>Live Telemetry</h3>
        <div class="readout">
            <div>Height: <span id="out-h">0.00 m</span></div>
            <div>Speed: <span id="out-v">0.00 m/s</span></div>
            <div>Total Energy: <span id="out-te">0.00 J</span></div>
            <div>Thermal: <span id="out-th">0.00 J</span></div>
        </div>

        <h3>Energy Breakdown</h3>
        <div class="energy-bars">
            <div class="bar-container">
                <div class="bar" id="bar-pe"></div>
                <div class="bar-label">Potential Energy</div>
            </div>
            <div class="bar-container">
                <div class="bar" id="bar-ke"></div>
                <div class="bar-label">Kinetic Energy</div>
            </div>
            <div class="bar-container">
                <div class="bar" id="bar-th"></div>
                <div class="bar-label">Thermal Energy</div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    const lineGraphCanvas = document.getElementById('lineGraphCanvas');
    const lineCtx = lineGraphCanvas.getContext('2d');

    const SCALE = 35; // Pixels per meter
    const GROUND_Y = canvas.height - 20;
    const RADIUS = 15;
    const MAX_GRAPH_POINTS = 300; 

    let state = {
        y: 8,       
        v: 0,       
        pe: 0,
        ke: 0,
        thermal: 0,
        totalInitialEnergy: 0,
        isResting: false,
        history: [] 
    };

    const slSpeed = document.getElementById('sl-speed');
    const slHeight = document.getElementById('sl-height');
    const slGravity = document.getElementById('sl-gravity');
    const slMass = document.getElementById('sl-mass');
    const slBounce = document.getElementById('sl-bounce');
    const slTrails = document.getElementById('sl-trails');

    const outH = document.getElementById('out-h');
    const outV = document.getElementById('out-v');
    const outTe = document.getElementById('out-te');
    const outTh = document.getElementById('out-th');

    const barPE = document.getElementById('bar-pe');
    const barKE = document.getElementById('bar-ke');
    const barTH = document.getElementById('bar-th');

    function updateSliderLabels() {
        document.getElementById('val-speed').innerText = parseFloat(slSpeed.value).toFixed(1) + "x";
        document.getElementById('val-height').innerText = slHeight.value;
        document.getElementById('val-gravity').innerText = slGravity.value;
        document.getElementById('val-mass').innerText = slMass.value;
        document.getElementById('val-bounce').innerText = slBounce.value;
        document.getElementById('val-trails').innerText = 
            slTrails.value == 0 ? "Off" : (slTrails.value > 0.7 ? "Long" : "Medium");
    }

    [slHeight, slGravity, slMass].forEach(el => {
        el.addEventListener('input', () => {
            updateSliderLabels();
            resetSim();
        });
    });
    [slSpeed, slBounce, slTrails].forEach(el => {
        el.addEventListener('input', updateSliderLabels); 
    });

    function resetSim() {
        const h = parseFloat(slHeight.value);
        const g = parseFloat(slGravity.value);
        const m = parseFloat(slMass.value);

        state.y = h;
        state.v = 0;
        state.isResting = false;
        state.thermal = 0;
        state.totalInitialEnergy = m * g * h; 
        state.pe = state.totalInitialEnergy;
        state.ke = 0;
        state.history = []; 
        
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawLineGraph() {
        lineCtx.fillStyle = '#1a1a1a';
        lineCtx.fillRect(0, 0, lineGraphCanvas.width, lineGraphCanvas.height);
        
        if (state.history.length === 0) return;

        const w = lineGraphCanvas.width;
        const h = lineGraphCanvas.height;
        const padding = 15;
        const plotHeight = h - (padding * 2);
        const maxE = state.totalInitialEnergy || 1;

        // Draw dotted ceiling line for reference
        lineCtx.beginPath();
        lineCtx.strokeStyle = '#4CAF50';
        lineCtx.setLineDash([5, 5]);
        lineCtx.moveTo(0, padding);
        lineCtx.lineTo(w, padding);
        lineCtx.stroke();
        lineCtx.setLineDash([]);
        
        lineCtx.fillStyle = '#4CAF50';
        lineCtx.font = "12px sans-serif";
        lineCtx.fillText("Total Energy (Constant)", 5, padding + 15);

        const drawLine = (key, color) => {
            lineCtx.beginPath();
            lineCtx.strokeStyle = color;
            lineCtx.lineWidth = 2.5;

            for (let i = 0; i < state.history.length; i++) {
                const x = (i / (MAX_GRAPH_POINTS - 1)) * w;
                const val = state.history[i][key];
                const y = h - padding - (val / maxE) * plotHeight;
                
                if (i === 0) lineCtx.moveTo(x, y);
                else lineCtx.lineTo(x, y);
            }
            lineCtx.stroke();
        };

        drawLine('thermal', '#f1c40f');
        drawLine('pe', '#3498db');
        drawLine('ke', '#e74c3c');
    }

    let lastTime = 0;
    function loop(timestamp) {
        let rawDt = (timestamp - lastTime) / 1000;
        if (rawDt > 0.05) rawDt = 0.05; 
        if (!lastTime) rawDt = 0.016;
        lastTime = timestamp;

        const speedScale = parseFloat(slSpeed.value);
        let dt = rawDt * speedScale;

        const g = parseFloat(slGravity.value);
        const m = parseFloat(slMass.value);
        const restitution = parseFloat(slBounce.value);
        const trailsAlpha = 1 - parseFloat(slTrails.value);

        // STRICT ALGEBRAIC ENERGY LOCKING
        if (!state.isResting && speedScale > 0) {
            let next_y = state.y + (state.v * dt) - (0.5 * g * dt * dt);
            let next_v = state.v - g * dt;

            if (next_y <= 0) {
                // Ball hits ground
                state.y = 0;
                state.pe = 0;
                
                // Maximum kinetic energy possible right at the floor
                let impact_ke = state.totalInitialEnergy - state.thermal;
                
                if (impact_ke < 0.05) { 
                    // Energy too low, force resting state
                    state.thermal = state.totalInitialEnergy; 
                    state.ke = 0;
                    state.pe = 0;
                    state.v = 0;
                    state.isResting = true;
                } else {
                    // Perfect bounce
                    let v_impact = Math.sqrt(2 * impact_ke / m);
                    state.v = v_impact * restitution; 
                    
                    state.ke = 0.5 * m * state.v * state.v;
                    // Any energy not used by the new bounce speed is forced into thermal
                    state.thermal = state.totalInitialEnergy - state.ke;
                }
            } else {
                // Mid-air flight
                state.y = next_y;
                state.pe = m * g * state.y;
                
                // Algebraically calculate exactly what the Kinetic Energy MUST be
                let expected_ke = state.totalInitialEnergy - state.thermal - state.pe;
                
                if (expected_ke <= 0) {
                    // Ball is at its exact apex, no kinetic energy
                    state.ke = 0;
                    state.v = 0;
                    // Force the height to match the remaining energy perfectly
                    state.y = (state.totalInitialEnergy - state.thermal) / (m * g);
                    state.pe = state.totalInitialEnergy - state.thermal;
                } else {
                    // Ball is falling/rising normally
                    state.ke = expected_ke;
                    // Force velocity to match exact kinetic energy
                    let direction = Math.sign(next_v) === 0 ? 1 : Math.sign(next_v);
                    state.v = direction * Math.sqrt(2 * expected_ke / m);
                }
            }
        }

        // DATA RECORDING 
        if (speedScale > 0) {
            state.history.push({
                pe: state.pe,
                ke: state.ke,
                thermal: state.thermal
            });
            if (state.history.length > MAX_GRAPH_POINTS) {
                state.history.shift(); 
            }
        }

        // RENDER SIMULATION
        ctx.fillStyle = `rgba(0, 0, 0, ${trailsAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#444';
        ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
        ctx.strokeStyle = '#666';
        ctx.beginPath();
        ctx.moveTo(0, GROUND_Y);
        ctx.lineTo(canvas.width, GROUND_Y);
        ctx.stroke();

        const pixelY = GROUND_Y - (state.y * SCALE) - RADIUS;
        ctx.beginPath();
        ctx.arc(canvas.width / 2, pixelY, RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = '#e74c3c';
        ctx.fill();
        ctx.strokeStyle = '#c0392b';
        ctx.lineWidth = 2;
        ctx.stroke();

        drawLineGraph();

        // UI UPDATE
        outH.innerText = state.y.toFixed(2) + " m";
        outV.innerText = Math.abs(state.v).toFixed(2) + " m/s";
        outTh.innerText = state.thermal.toFixed(2) + " J";
        
        // This recalculates Total Energy every single frame by adding the variables together. 
        // It serves as proof that PE + KE + Thermal perfectly equals the Total Initial Energy at all times.
        let liveTotalEnergy = state.pe + state.ke + state.thermal;
        outTe.innerText = liveTotalEnergy.toFixed(2) + " J"; 

        const pePct = Math.max(0, Math.min(100, (state.pe / state.totalInitialEnergy) * 100));
        const kePct = Math.max(0, Math.min(100, (state.ke / state.totalInitialEnergy) * 100));
        const thPct = Math.max(0, Math.min(100, (state.thermal / state.totalInitialEnergy) * 100));

        barPE.style.width = (isNaN(pePct) ? 0 : pePct) + "%";
        barKE.style.width = (isNaN(kePct) ? 0 : kePct) + "%";
        barTH.style.width = (isNaN(thPct) ? 0 : thPct) + "%";

        requestAnimationFrame(loop);
    }

    updateSliderLabels();
    resetSim();
    requestAnimationFrame(loop);

</script>
</body>
</html>
