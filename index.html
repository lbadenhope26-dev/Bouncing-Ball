<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing Ball Energy Simulation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            display: flex;
            gap: 20px;
            max-width: 1400px; /* Widened to fit three columns */
        }
        .left-col {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .center-col {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 400px;
        }
        canvas {
            background-color: #000;
            border: 2px solid #444;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .panel {
            background-color: #2d2d2d;
            padding: 20px;
            border-radius: 8px;
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            margin-bottom: 5px;
            color: #aaa;
        }
        input[type="range"] {
            width: 100%;
        }
        .readout {
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .readout div {
            display: flex;
            flex-direction: column;
        }
        .readout span {
            color: #4CAF50;
            font-size: 1.2em;
            font-weight: bold;
        }
        .energy-bars {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }
        .bar-container {
            width: 100%;
            height: 20px;
            background-color: #444;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }
        .bar {
            height: 100%;
            width: 0%;
            transition: width 0.05s linear;
        }
        #bar-pe { background-color: #3498db; }
        #bar-ke { background-color: #e74c3c; }
        #bar-th { background-color: #f1c40f; }
        .bar-label {
            position: absolute;
            top: 0;
            left: 5px;
            font-size: 0.8em;
            line-height: 20px;
            text-shadow: 1px 1px 2px black;
        }
        .graph-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: #aaa;
            margin-bottom: -10px;
            margin-top: 5px;
        }
        .legend span {
            margin-left: 10px;
            font-weight: bold;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
        button:hover { background-color: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <div class="left-col">
        <canvas id="simCanvas" width="400" height="400"></canvas>
    </div>

    <div class="center-col">
        <div class="graph-header">
            <span>Stacked Area Chart</span>
            <div class="legend">
                <span style="color: #3498db;">■ PE</span>
                <span style="color: #e74c3c;">■ KE</span>
                <span style="color: #f1c40f;">■ Thermal</span>
            </div>
        </div>
        <canvas id="stackedGraphCanvas" width="400" height="180"></canvas>

        <div class="graph-header" style="margin-top: 10px;">
            <span>Line Graph (Independent Variables)</span>
            <div class="legend">
                <span style="color: #3498db;">— PE</span>
                <span style="color: #e74c3c;">— KE</span>
                <span style="color: #f1c40f;">— Thermal</span>
            </div>
        </div>
        <canvas id="lineGraphCanvas" width="400" height="180"></canvas>
    </div>

    <div class="panel">
        <h3>Simulation Parameters</h3>
        
        <div class="control-group">
            <label>Drop Height (m) <span id="val-height">8.0</span></label>
            <input type="range" id="sl-height" min="1" max="10" step="0.1" value="8">
        </div>
        
        <div class="control-group">
            <label>Gravity (m/s²) <span id="val-gravity">9.8</span></label>
            <input type="range" id="sl-gravity" min="1" max="20" step="0.1" value="9.8">
        </div>
        
        <div class="control-group">
            <label>Mass (kg) <span id="val-mass">1.0</span></label>
            <input type="range" id="sl-mass" min="0.1" max="10" step="0.1" value="1.0">
        </div>
        
        <div class="control-group">
            <label>Bounciness (Restitution) <span id="val-bounce">0.75</span></label>
            <input type="range" id="sl-bounce" min="0" max="1" step="0.05" value="0.75">
        </div>

        <div class="control-group">
            <label>Ghost Trails <span id="val-trails">Medium</span></label>
            <input type="range" id="sl-trails" min="0" max="0.95" step="0.05" value="0.5">
        </div>

        <button onclick="resetSim()">Drop Ball</button>

        <h3>Live Telemetry</h3>
        <div class="readout">
            <div>Height: <span id="out-h">0.00 m</span></div>
            <div>Speed: <span id="out-v">0.00 m/s</span></div>
            <div>Total Energy: <span id="out-te">0.0 J</span></div>
            <div>Thermal: <span id="out-th">0.0 J</span></div>
        </div>

        <h3>Energy Breakdown</h3>
        <div class="energy-bars">
            <div class="bar-container">
                <div class="bar" id="bar-pe"></div>
                <div class="bar-label">Potential Energy</div>
            </div>
            <div class="bar-container">
                <div class="bar" id="bar-ke"></div>
                <div class="bar-label">Kinetic Energy</div>
            </div>
            <div class="bar-container">
                <div class="bar" id="bar-th"></div>
                <div class="bar-label">Thermal Energy</div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    const stackedGraphCanvas = document.getElementById('stackedGraphCanvas');
    const stackedCtx = stackedGraphCanvas.getContext('2d');

    const lineGraphCanvas = document.getElementById('lineGraphCanvas');
    const lineCtx = lineGraphCanvas.getContext('2d');

    const SCALE = 35; // Pixels per meter
    const GROUND_Y = canvas.height - 20;
    const RADIUS = 15;
    const MAX_GRAPH_POINTS = 250; // Controls scrolling speed

    let state = {
        y: 8,       
        v: 0,       
        pe: 0,
        ke: 0,
        thermal: 0,
        totalInitialEnergy: 0,
        isResting: false,
        history: [] 
    };

    const slHeight = document.getElementById('sl-height');
    const slGravity = document.getElementById('sl-gravity');
    const slMass = document.getElementById('sl-mass');
    const slBounce = document.getElementById('sl-bounce');
    const slTrails = document.getElementById('sl-trails');

    const outH = document.getElementById('out-h');
    const outV = document.getElementById('out-v');
    const outTe = document.getElementById('out-te');
    const outTh = document.getElementById('out-th');

    const barPE = document.getElementById('bar-pe');
    const barKE = document.getElementById('bar-ke');
    const barTH = document.getElementById('bar-th');

    function updateSliderLabels() {
        document.getElementById('val-height').innerText = slHeight.value;
        document.getElementById('val-gravity').innerText = slGravity.value;
        document.getElementById('val-mass').innerText = slMass.value;
        document.getElementById('val-bounce').innerText = slBounce.value;
        document.getElementById('val-trails').innerText = 
            slTrails.value == 0 ? "Off" : (slTrails.value > 0.7 ? "Long" : "Medium");
    }

    [slHeight, slGravity, slMass].forEach(el => {
        el.addEventListener('input', () => {
            updateSliderLabels();
            resetSim();
        });
    });
    [slBounce, slTrails].forEach(el => {
        el.addEventListener('input', updateSliderLabels);
    });

    function resetSim() {
        const h = parseFloat(slHeight.value);
        const g = parseFloat(slGravity.value);
        const m = parseFloat(slMass.value);

        state.y = h;
        state.v = 0;
        state.isResting = false;
        state.thermal = 0;
        state.totalInitialEnergy = m * g * h;
        state.history = []; 
        
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawStackedGraph() {
        stackedCtx.fillStyle = '#1a1a1a';
        stackedCtx.fillRect(0, 0, stackedGraphCanvas.width, stackedGraphCanvas.height);
        
        if (state.history.length === 0) return;

        const w = stackedGraphCanvas.width;
        const h = stackedGraphCanvas.height;
        const maxE = state.totalInitialEnergy || 1;

        const drawLayer = (valFunc, color) => {
            stackedCtx.beginPath();
            stackedCtx.fillStyle = color;
            stackedCtx.moveTo(0, h); 

            for (let i = 0; i < state.history.length; i++) {
                const x = (i / (MAX_GRAPH_POINTS - 1)) * w;
                const val = valFunc(state.history[i]);
                const y = h - (val / maxE) * h;
                stackedCtx.lineTo(x, y);
            }

            const lastX = ((state.history.length - 1) / (MAX_GRAPH_POINTS - 1)) * w;
            stackedCtx.lineTo(lastX, h);
            stackedCtx.lineTo(0, h);
            stackedCtx.fill();
        };

        drawLayer(pt => pt.thermal + pt.pe + pt.ke, '#e74c3c');
        drawLayer(pt => pt.thermal + pt.pe, '#3498db');
        drawLayer(pt => pt.thermal, '#f1c40f');
    }

    function drawLineGraph() {
        lineCtx.fillStyle = '#1a1a1a';
        lineCtx.fillRect(0, 0, lineGraphCanvas.width, lineGraphCanvas.height);
        
        if (state.history.length === 0) return;

        const w = lineGraphCanvas.width;
        const h = lineGraphCanvas.height;
        const padding = 10;
        const plotHeight = h - (padding * 2);
        const maxE = state.totalInitialEnergy || 1;

        // Draw dotted ceiling line for reference
        lineCtx.beginPath();
        lineCtx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        lineCtx.setLineDash([5, 5]);
        lineCtx.moveTo(0, padding);
        lineCtx.lineTo(w, padding);
        lineCtx.stroke();
        lineCtx.setLineDash([]);

        const drawLine = (key, color) => {
            lineCtx.beginPath();
            lineCtx.strokeStyle = color;
            lineCtx.lineWidth = 2;

            for (let i = 0; i < state.history.length; i++) {
                const x = (i / (MAX_GRAPH_POINTS - 1)) * w;
                const val = state.history[i][key];
                const y = h - padding - (val / maxE) * plotHeight;
                
                if (i === 0) lineCtx.moveTo(x, y);
                else lineCtx.lineTo(x, y);
            }
            lineCtx.stroke();
        };

        drawLine('thermal', '#f1c40f');
        drawLine('pe', '#3498db');
        drawLine('ke', '#e74c3c');
    }

    let lastTime = 0;
    function loop(timestamp) {
        let dt = (timestamp - lastTime) / 1000;
        if (dt > 0.05) dt = 0.05; 
        if (!lastTime) dt = 0.016;
        lastTime = timestamp;

        const g = parseFloat(slGravity.value);
        const m = parseFloat(slMass.value);
        const restitution = parseFloat(slBounce.value);
        const trailsAlpha = 1 - parseFloat(slTrails.value);

        // PHYSICS EXACT KINEMATICS
        if (!state.isResting) {
            state.y += (state.v * dt) - (0.5 * g * dt * dt);
            state.v -= g * dt;

            if (state.y <= 0) {
                state.y = 0;
                
                if (Math.abs(state.v) < 0.5) {
                    state.thermal += 0.5 * m * (state.v * state.v);
                    state.v = 0;
                    state.isResting = true;
                } else {
                    let ke_before = 0.5 * m * (state.v * state.v);
                    state.v = -state.v * restitution;
                    let ke_after = 0.5 * m * (state.v * state.v);
                    state.thermal += (ke_before - ke_after);
                }
            }
        }

        // ENERGY CALCULATIONS
        state.pe = m * g * state.y;
        state.ke = 0.5 * m * (state.v * state.v);

        // DATA RECORDING
        state.history.push({
            pe: state.pe,
            ke: state.ke,
            thermal: state.thermal
        });
        if (state.history.length > MAX_GRAPH_POINTS) {
            state.history.shift(); 
        }

        // RENDER SIMULATION
        ctx.fillStyle = `rgba(0, 0, 0, ${trailsAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#444';
        ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
        ctx.strokeStyle = '#666';
        ctx.beginPath();
        ctx.moveTo(0, GROUND_Y);
        ctx.lineTo(canvas.width, GROUND_Y);
        ctx.stroke();

        const pixelY = GROUND_Y - (state.y * SCALE) - RADIUS;
        ctx.beginPath();
        ctx.arc(canvas.width / 2, pixelY, RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = '#e74c3c';
        ctx.fill();
        ctx.strokeStyle = '#c0392b';
        ctx.lineWidth = 2;
        ctx.stroke();

        // RENDER GRAPHS
        drawStackedGraph();
        drawLineGraph();

        // UI UPDATE
        outH.innerText = state.y.toFixed(2) + " m";
        outV.innerText = Math.abs(state.v).toFixed(2) + " m/s";
        outTe.innerText = (state.pe + state.ke + state.thermal).toFixed(1) + " J";
        outTh.innerText = state.thermal.toFixed(1) + " J";

        const pePct = Math.max(0, Math.min(100, (state.pe / state.totalInitialEnergy) * 100));
        const kePct = Math.max(0, Math.min(100, (state.ke / state.totalInitialEnergy) * 100));
        const thPct = Math.max(0, Math.min(100, (state.thermal / state.totalInitialEnergy) * 100));

        barPE.style.width = (isNaN(pePct) ? 0 : pePct) + "%";
        barKE.style.width = (isNaN(kePct) ? 0 : kePct) + "%";
        barTH.style.width = (isNaN(thPct) ? 0 : thPct) + "%";

        requestAnimationFrame(loop);
    }

    updateSliderLabels();
    resetSim();
    requestAnimationFrame(loop);

</script>
</body>
</html>
